; Local PHP CLI configuration for the Saldi toolchain slice.
; The winget-installed PHP 8.3 on this machine loads NO php.ini by default
; (php --ini reports "Loaded Configuration File: (none)"), so PHPUnit 11
; fails at startup: it requires ext-mbstring, whose DLL ships with the
; winget package but is never enabled. This file enables it explicitly.
;
; Usage: php -c "C:/Users/miyam/dev/saldi/tools/php/php.ini" tools/php/phpunit.phar ...
;
; NOTE: extension_dir below is hard-coded to this machine's winget PHP 8.3
; install location. If PHP is reinstalled/upgraded/moved, update this path
; (or set PHPUNIT_CMD's -d extension_dir override) accordingly.
extension_dir = "C:/Users/miyam/AppData/Local/Microsoft/WinGet/Packages/PHP.PHP.8.3_Microsoft.Winget.Source_8wekyb3d8bbwe/ext"
extension = php_mbstring.dll
extension=openssl
extension=zip
extension=curl
