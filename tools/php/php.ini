; Local PHP CLI configuration for the Saldi toolchain slice.
; Some PHP builds (e.g. the winget PHP package on Windows) load NO php.ini by
; default ("php --ini" reports "Loaded Configuration File: (none)"), so PHPUnit
; and Composer fail at startup: they require extensions whose DLLs ship with
; the package but are never enabled. This file enables them explicitly.
;
; NOTE: extension_dir is deliberately NOT set here — it is machine-specific.
; The supported entry point is tools/php/phpw.php, which auto-detects the
; ext/ directory next to the PHP binary and passes the equivalent -d flags,
; so most workflows never need this file:
;
;   php tools/php/phpw.php tools/php/composer.phar install
;   php tools/php/phpw.php tools/php/composer.phar test
;
; If you invoke php -c with this file directly on a build whose compiled-in
; extension_dir default is wrong, add the override yourself:
;
;   php -c tools/php/php.ini -d extension_dir="<dir-of-php-binary>/ext" ...
;
; 20260723 CL/LH SD-593: removed hard-coded winget extension_dir; phpw.php
;                auto-detects it instead.
extension=mbstring
extension=openssl
extension=zip
extension=curl
